name: Analysis Report
description: |
  Query data → analyze patterns → generate report.
  Single pass workflow for data analysis tasks.
version: "1.0"
loop: false

variables:
  question:
    type: string
    required: true
    description: "The analysis question to answer"
  data_source:
    type: string
    default: "bigquery"
    description: "Where to query data from"
  time_range:
    type: string
    default: "7d"
    description: "Time range for the analysis"
  output_channel:
    type: string
    default: ""
    description: "Slack channel for results"

budget:
  max_iterations: 1
  max_total_minutes: 45
  max_agent_spawns: 5

checkpoints:
  - name: query
    kind: task
    description: "Query and collect raw data"
    agent_task: |
      Collect data to answer: {{question}}

      Data source: {{data_source}}
      Time range: {{time_range}}

      1. Write and run appropriate queries
      2. Save raw results to /tmp/analysis-data.json
      3. Note sample size, data quality issues, caveats

      Output: data summary, row count, any data quality notes.
    agent_label: "analysis-query"
    timeout_min: 15
    outputs: ["data_summary", "row_count"]

  - name: analyze
    kind: task
    description: "Analyze patterns and derive insights"
    agent_task: |
      Analyze the data collected in /tmp/analysis-data.json.

      **Question:** {{question}}
      **Data summary:** {{data_summary}}
      **Row count:** {{row_count}}

      1. Identify key patterns and trends
      2. Calculate relevant metrics
      3. Find outliers or anomalies
      4. Draw conclusions
      5. Note limitations

      Output: structured findings with key metrics.
    agent_label: "analysis-analyze"
    timeout_min: 15
    outputs: ["findings", "key_metrics"]

  - name: report
    kind: decision
    description: "Review analysis and decide on delivery"
    decision_prompt: |
      ## Analysis Report

      **Question:** {{question}}
      **Data:** {{row_count}} rows from {{data_source}} ({{time_range}})

      **Findings:**
      {{findings}}

      **Key Metrics:**
      {{key_metrics}}

      Options:
      1. **publish** — Share to {{output_channel}}
      2. **refine** — Need deeper analysis
      3. **discard** — Not useful
    decision_options:
      - publish
      - refine
      - discard

metadata:
  type: analysis

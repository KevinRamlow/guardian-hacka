<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replicants</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #06080d;
  --bg-surface: #0c1017;
  --bg-card: #111620;
  --bg-card-hover: #161d2a;
  --bg-elevated: #1a2233;
  --bg-inset: #080b11;
  --border: rgba(255,255,255,0.06);
  --border-bright: rgba(255,255,255,0.12);
  --text-primary: #e8ecf4;
  --text-secondary: #8892a4;
  --text-muted: #515c6e;
  --accent-cyan: #06b6d4;
  --accent-blue: #3b82f6;
  --accent-indigo: #6366f1;
  --accent-purple: #a855f7;
  --accent-green: #22c55e;
  --accent-yellow: #eab308;
  --accent-orange: #f97316;
  --accent-red: #ef4444;
  --accent-pink: #ec4899;
  --role-developer: #3b82f6;
  --role-reviewer: #a855f7;
  --role-architect: #06b6d4;
  --role-guardian-tuner: #f97316;
  --role-debugger: #ef4444;
  --role-main: #6366f1;
  --source-manual: #3b82f6;
  --source-auto-queue: #22c55e;
  --source-auto-review: #a855f7;
  --source-callback: #eab308;
  --status-healthy: #22c55e;
  --status-aging: #eab308;
  --status-warning: #f97316;
  --status-frozen: #ef4444;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  font-family: var(--font-sans);
  background: var(--bg-base);
  color: var(--text-primary);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  height: 100%;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

/* ═══════════ LAYOUT: two-panel ═══════════ */
.app { display: flex; height: 100vh; overflow: hidden; }

.main-panel {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px 40px;
}

.sidebar {
  width: 380px;
  border-left: 1px solid var(--border);
  background: var(--bg-surface);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

/* ═══════════ STATUS BAR (replaces header) ═══════════ */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.status-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.connection-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent-red); transition: background 0.3s;
}
.connection-dot.connected { background: var(--status-healthy); box-shadow: 0 0 8px rgba(34,197,94,0.4); }

.last-updated { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

.btn-refresh {
  background: var(--bg-card); border: 1px solid var(--border-bright);
  color: var(--text-secondary); padding: 5px 12px; border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.btn-refresh:hover { background: var(--bg-elevated); color: var(--text-primary); }

/* ═══════════ ALERTS ═══════════ */
.alerts-bar { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.alert-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; border-radius: var(--radius-md); font-size: 12px;
  animation: alertIn 0.3s ease;
}
.alert-item.critical { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: var(--accent-red); }
.alert-item.warning { background: rgba(249,115,22,0.08); border: 1px solid rgba(249,115,22,0.2); color: var(--accent-orange); }
.alert-badge {
  font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
  padding: 2px 7px; border-radius: 3px; text-transform: uppercase;
}
.critical .alert-badge { background: rgba(239,68,68,0.2); }
.warning .alert-badge { background: rgba(249,115,22,0.15); }
.alert-msg { flex: 1; }
.alert-task { font-family: var(--font-mono); font-size: 11px; opacity: 0.7; }
@keyframes alertIn { from { transform: translateY(-6px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ═══════════ TIME FILTER ═══════════ */
.filter-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.filter-buttons { display: flex; gap: 4px; }
.filter-btn {
  padding: 4px 12px; border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 500; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { color: var(--text-secondary); border-color: var(--border-bright); }
.filter-btn.active {
  background: var(--accent-cyan); color: var(--bg-base);
  border-color: var(--accent-cyan); font-weight: 600;
}

/* ═══════════ KPI ROW ═══════════ */
.kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
.kpi-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 14px; transition: border-color 0.2s;
}
.kpi-card:hover { border-color: var(--border-bright); }
.kpi-label {
  font-size: 9px; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;
}
.kpi-value {
  font-size: 26px; font-weight: 700; font-family: var(--font-mono);
  letter-spacing: -1px; line-height: 1;
}
.kpi-sub { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
.kpi-value.c-cyan { color: var(--accent-cyan); }
.kpi-value.c-green { color: var(--accent-green); }
.kpi-value.c-red { color: var(--accent-red); }
.kpi-value.c-blue { color: var(--accent-blue); }
.kpi-value.c-yellow { color: var(--accent-yellow); }

/* ═══════════ SECTION ═══════════ */
.section { margin-bottom: 22px; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.section-title {
  font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text-muted);
}
.section-line { flex: 1; height: 1px; background: var(--border); }
.section-badge {
  font-size: 10px; font-family: var(--font-mono); color: var(--text-muted);
  background: var(--bg-card); padding: 2px 7px; border-radius: var(--radius-sm);
}

/* ═══════════ INFRASTRUCTURE ═══════════ */
.infra-strip { display: flex; gap: 8px; flex-wrap: wrap; }
.infra-item {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 500;
}
.infra-dot { width: 6px; height: 6px; border-radius: 50%; }
.infra-dot.ok { background: var(--status-healthy); box-shadow: 0 0 6px rgba(34,197,94,0.3); }
.infra-dot.down { background: var(--accent-red); box-shadow: 0 0 6px rgba(239,68,68,0.3); }
.infra-dot.partial { background: var(--status-warning); }
.infra-dot.paused { background: var(--status-aging); }
.infra-dot.unknown { background: var(--text-muted); }
.infra-dot.offline { background: var(--accent-red); opacity: 0.5; }
.infra-label { color: var(--text-secondary); }
.infra-value { color: var(--text-muted); font-family: var(--font-mono); font-size: 10px; }

/* ═══════════ REPLICANTS ═══════════ */
.replicants-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.replicant-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  position: relative; overflow: hidden; transition: border-color 0.2s;
}
.replicant-card:hover { border-color: var(--border-bright); }
.replicant-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:3px; }
.replicant-card.anton::before { background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); }
.replicant-card.son-of-anton::before { background: linear-gradient(90deg, var(--accent-purple), var(--accent-pink)); }
.replicant-card.billy::before { background: linear-gradient(90deg, var(--accent-yellow), var(--accent-orange)); }

.rep-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.rep-name { font-size: 14px; font-weight: 700; }
.rep-pill {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
}
.rep-pill.online { background: rgba(34,197,94,0.12); color: var(--status-healthy); }
.rep-pill.offline { background: rgba(239,68,68,0.1); color: var(--accent-red); }
.rep-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.rep-role { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
.rep-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.rep-metric-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.rep-metric-value { font-size: 13px; font-weight: 600; font-family: var(--font-mono); }

/* ═══════════ ACTIVE AGENTS ═══════════ */
.agents-grid { display: flex; flex-direction: column; gap: 10px; }
.agent-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px 18px;
  position: relative; overflow: hidden; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.agent-card:hover { border-color: var(--border-bright); background: var(--bg-card-hover); }
.agent-card.selected { border-color: var(--accent-cyan); box-shadow: 0 0 0 1px var(--accent-cyan); }
.agent-card::before { content:''; position:absolute; left:0; top:0; width:3px; height:100%; }
.agent-card[data-health="healthy"]::before { background: var(--status-healthy); }
.agent-card[data-health="aging"]::before { background: var(--status-aging); }
.agent-card[data-health="warning"]::before { background: var(--status-warning); }
.agent-card[data-health="frozen"]::before { background: var(--accent-red); }

.agent-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.agent-id { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--accent-cyan); }
.agent-label {
  font-size: 12px; color: var(--text-secondary); margin-top: 2px;
  max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.agent-badges { display: flex; gap: 5px; flex-shrink: 0; }
.badge {
  font-size: 9px; font-weight: 600; padding: 2px 7px;
  border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px;
}
.badge-role { color: white; }
.badge-role[data-role="developer"] { background: var(--role-developer); }
.badge-role[data-role="reviewer"] { background: var(--role-reviewer); }
.badge-role[data-role="architect"] { background: var(--role-architect); }
.badge-role[data-role="guardian-tuner"] { background: var(--role-guardian-tuner); }
.badge-role[data-role="debugger"] { background: var(--role-debugger); }
.badge-role[data-role="main"] { background: var(--role-main); }
.badge-source { background: rgba(255,255,255,0.06); color: var(--text-muted); }
.badge-source[data-source="auto-queue"] { color: var(--source-auto-queue); background: rgba(34,197,94,0.1); }
.badge-source[data-source="auto-review"] { color: var(--source-auto-review); background: rgba(168,85,247,0.1); }
.badge-source[data-source="manual"] { color: var(--source-manual); background: rgba(59,130,246,0.1); }
.badge-source[data-source="process-callback"] { color: var(--source-callback); background: rgba(234,179,8,0.1); }

.agent-progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.progress-bar-wrap { flex: 1; height: 4px; background: var(--bg-inset); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
.progress-fill.healthy { background: var(--status-healthy); }
.progress-fill.aging { background: var(--status-aging); }
.progress-fill.warning { background: var(--status-warning); }
.progress-fill.frozen { background: var(--accent-red); }
.agent-timing { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; }

.agent-details { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.agent-detail { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 3px; }
.agent-detail .val { color: var(--text-secondary); font-family: var(--font-mono); }
.agent-activity {
  font-size: 10px; font-family: var(--font-mono); color: var(--text-muted);
  padding: 3px 7px; background: var(--bg-inset); border-radius: var(--radius-sm);
  max-width: 350px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.agent-linear {
  margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; font-size: 11px;
}
.linear-state { display: flex; align-items: center; gap: 4px; font-weight: 500; }
.linear-dot { width: 7px; height: 7px; border-radius: 2px; }
.linear-title { color: var(--text-secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.linear-updated { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

.agent-actions { display: flex; gap: 5px; margin-top: 8px; }
.btn-sm {
  padding: 3px 10px; border-radius: var(--radius-sm);
  font-size: 10px; font-weight: 500; border: 1px solid var(--border-bright);
  background: var(--bg-elevated); color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s;
}
.btn-sm:hover { color: var(--text-primary); }
.btn-sm.danger { border-color: rgba(239,68,68,0.3); color: var(--accent-red); }
.btn-sm.danger:hover { background: rgba(239,68,68,0.1); }

.empty-state { text-align: center; padding: 30px 16px; color: var(--text-muted); font-size: 12px; }

/* ═══════════ SOURCE BREAKDOWN ═══════════ */
.source-breakdown { display: flex; gap: 10px; flex-wrap: wrap; }
.source-item { display: flex; align-items: center; gap: 5px; font-size: 11px; }
.source-dot { width: 8px; height: 8px; border-radius: 2px; }
.source-label { color: var(--text-secondary); }
.source-count { font-family: var(--font-mono); font-weight: 600; }

/* ═══════════ PROCESSES ═══════════ */
.proc-table {
  width: 100%; border-collapse: collapse; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden;
}
.proc-table th {
  font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted); text-align: left; padding: 8px 12px;
  background: var(--bg-elevated); border-bottom: 1px solid var(--border);
}
.proc-table td {
  font-size: 11px; padding: 6px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary);
}
.proc-table tr:last-child td { border-bottom: none; }
.proc-table .mono { font-family: var(--font-mono); }
.proc-table .alive-y { color: var(--accent-green); }
.proc-table .alive-n { color: var(--accent-red); }

/* ═══════════ RECENT ═══════════ */
.recent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.recent-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 12px; transition: border-color 0.2s;
}
.recent-card:hover { border-color: var(--border-bright); }
.recent-card.success { border-left: 3px solid var(--accent-green); }
.recent-card.failure { border-left: 3px solid var(--accent-red); }
.recent-id { font-family: var(--font-mono); font-size: 12px; font-weight: 600; margin-bottom: 3px; }
.recent-label { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.recent-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); }
.recent-meta .mono { font-family: var(--font-mono); }

/* ═══════════ SIDEBAR ═══════════ */
.sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-title {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
}

/* Langfuse in sidebar */
.lf-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.lf-kpi { text-align: center; }
.lf-kpi-val { font-size: 16px; font-weight: 700; font-family: var(--font-mono); letter-spacing: -0.5px; }
.lf-kpi-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-top: 2px; }

.trace-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 11px;
}
.trace-item:last-child { border-bottom: none; }
.trace-name { flex: 1; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.trace-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.trace-status-ok { color: var(--accent-green); font-size: 10px; }
.trace-status-err { color: var(--accent-red); font-size: 10px; }

/* GitHub in sidebar */
.commit-item {
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.commit-item:last-child { border-bottom: none; }
.commit-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.commit-repo {
  font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.commit-repo.anton { background: rgba(6,182,212,0.15); color: var(--accent-cyan); }
.commit-repo.son-of-anton { background: rgba(168,85,247,0.15); color: var(--accent-purple); }
.commit-repo.billy { background: rgba(234,179,8,0.15); color: var(--accent-yellow); }
.commit-sha { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
.commit-date { font-size: 10px; color: var(--text-muted); margin-left: auto; }
.commit-msg { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
.commit-author { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* ═══════════ EVAL in sidebar ═══════════ */
.eval-summary { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
.eval-kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; text-align: center; min-width: 100px; }
.eval-kpi-val { font-size: 20px; font-weight: 700; font-family: var(--font-mono); }
.eval-kpi-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-top: 2px; }
.eval-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.eval-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; position: relative; overflow: hidden; }
.eval-card::before { content:''; position:absolute; left:0; top:0; width:3px; height:100%; }
.eval-card.positive::before { background: var(--accent-green); }
.eval-card.negative::before { background: var(--accent-red); }
.eval-card.neutral::before { background: var(--text-muted); }
.eval-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.eval-card-date { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.eval-card-acc { font-size: 18px; font-weight: 700; font-family: var(--font-mono); }
.eval-card-delta { font-size: 12px; font-weight: 600; font-family: var(--font-mono); padding: 2px 6px; border-radius: 4px; }
.eval-card-delta.pos { color: var(--accent-green); background: rgba(0,255,100,0.1); }
.eval-card-delta.neg { color: var(--accent-red); background: rgba(255,80,80,0.1); }
.eval-card-bar { height: 4px; background: var(--bg-inset); border-radius: 2px; overflow: hidden; margin: 8px 0 4px; }
.eval-card-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.eval-card-meta { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-muted); }
.eval-progress-card { background: var(--bg-card); border: 1px solid var(--accent-cyan); border-radius: 8px; padding: 12px; margin-bottom: 10px; }
.eval-progress-card .eval-card-bar-fill { background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); }
.eval-metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
.eval-m { text-align: center; }
.eval-m-val { font-size: 18px; font-weight: 700; font-family: var(--font-mono); }
.eval-m-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-top: 2px; }
.eval-bar { height: 6px; background: var(--bg-inset); border-radius: 3px; overflow: hidden; margin: 8px 0; }
.eval-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); transition: width 1s; }
.eval-bar-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.eval-run {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px; background: var(--bg-inset); border-radius: var(--radius-sm);
  font-size: 11px; margin-bottom: 4px;
}
.eval-run-name { color: var(--text-secondary); }
.eval-run-acc { font-family: var(--font-mono); font-weight: 600; }
.eval-run-delta { font-family: var(--font-mono); font-size: 10px; }
.eval-run-delta.pos { color: var(--accent-green); }
.eval-run-delta.neg { color: var(--accent-red); }

/* ═══════════ STREAM PANEL ═══════════ */
.stream-overlay {
  position: fixed; top: 0; right: 0; width: 500px; height: 100vh;
  background: var(--bg-surface); border-left: 1px solid var(--border);
  z-index: 200; display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.3s ease;
  box-shadow: -8px 0 30px rgba(0,0,0,0.3);
}
.stream-overlay.open { transform: translateX(0); }
.stream-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg-card);
}
.stream-title { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--accent-cyan); }
.stream-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; padding: 4px; line-height: 1;
}
.stream-close:hover { color: var(--text-primary); }
.stream-body {
  flex: 1; overflow-y: auto; padding: 10px;
  font-family: var(--font-mono); font-size: 10px; line-height: 1.6;
}
.stream-event { padding: 2px 6px; border-radius: 3px; margin-bottom: 1px; word-break: break-all; }
.stream-event.tool { color: var(--accent-blue); }
.stream-event.text { color: var(--text-secondary); }
.stream-event.think { color: var(--accent-purple); font-style: italic; }
.stream-event.meta { color: var(--text-muted); }
.stream-event.result { color: var(--accent-green); }
.stream-event.error { color: var(--accent-red); }
.stream-event.done { color: var(--accent-cyan); font-weight: 600; }
.stream-event .ts { color: var(--text-muted); font-size: 9px; margin-right: 5px; }

/* ═══════════ SKELETON LOADING ═══════════ */
@keyframes skeleton-pulse {
  0% { opacity: 0.08; }
  50% { opacity: 0.15; }
  100% { opacity: 0.08; }
}
.skeleton-line {
  height: 12px;
  border-radius: 4px;
  background: var(--text-muted);
  animation: skeleton-pulse 1.2s ease-in-out infinite;
  margin-bottom: 6px;
}
.skeleton-line:nth-child(odd) { width: 85%; }
.skeleton-line:nth-child(even) { width: 60%; }
.skeleton-line:nth-child(3n) { width: 72%; }

/* ═══════════ RESPONSIVE ═══════════ */
@media (max-width: 1100px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); max-height: 50vh; }
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .replicants-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 700px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .replicants-grid { grid-template-columns: 1fr; }
  .stream-overlay { width: 100%; }
}
</style>
</head>
<body>
<div class="app">
  <!-- LEFT: Main Panel -->
  <div class="main-panel">
    <div class="status-bar">
      <div class="status-left">
        <div class="connection-dot" id="connectionDot"></div>
        <span class="last-updated" id="lastUpdated">--</span>
      </div>
      <button class="btn-refresh" id="btnRefresh">Refresh</button>
    </div>

    <div class="alerts-bar" id="alertsBar"></div>

    <div class="filter-row">
      <div class="filter-buttons" id="filterBtns">
        <button class="filter-btn" data-days="1">1d</button>
        <button class="filter-btn active" data-days="7">7d</button>
        <button class="filter-btn" data-days="30">30d</button>
        <button class="filter-btn" data-days="0">All</button>
      </div>
    </div>

    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi-card"><div class="kpi-label">Active</div><div class="kpi-value c-cyan" id="kpiActive">--</div><div class="kpi-sub" id="kpiSlots">--</div></div>
      <div class="kpi-card"><div class="kpi-label">Completed</div><div class="kpi-value c-green" id="kpiCompleted">--</div><div class="kpi-sub" id="kpiCompletedSub">--</div></div>
      <div class="kpi-card"><div class="kpi-label">Failed</div><div class="kpi-value c-red" id="kpiFailed">--</div><div class="kpi-sub">errors + timeouts</div></div>
      <div class="kpi-card"><div class="kpi-label">Avg Runtime</div><div class="kpi-value c-blue" id="kpiRuntime">--</div><div class="kpi-sub">minutes</div></div>
      <div class="kpi-card"><div class="kpi-label">Success Rate</div><div class="kpi-value c-green" id="kpiSuccessRate">--</div><div class="kpi-sub" id="kpiSuccessRateSub">--</div></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Infrastructure</span>
        <div class="section-line"></div>
      </div>
      <div class="infra-strip" id="infraStrip"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Replicants</span>
        <div class="section-line"></div>
      </div>
      <div class="replicants-grid" id="replicantsGrid"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Active Agents</span>
        <div class="section-line"></div>
        <span class="section-badge" id="activeCount">0</span>
      </div>
      <div class="agents-grid" id="agentsGrid"></div>
    </div>

    <!-- source breakdown + processes removed -->

    <div class="section">
      <div class="section-header">
        <span class="section-title">Recent Completions</span>
        <div class="section-line"></div>
        <span class="section-badge" id="recentCount">0</span>
      </div>
      <div class="recent-grid" id="recentGrid"></div>
    </div>

    <div class="section" id="evalSection">
      <div class="section-header">
        <span class="section-title">Guardian Eval Runs</span>
        <div class="section-line"></div>
        <span class="section-badge" id="evalCount">0</span>
      </div>
      <div id="evalContent"><div class="empty-state">No eval data</div></div>
    </div>
  </div>

  <!-- RIGHT: Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section" id="langfuseSection">
      <div class="sidebar-title">LLM Observability</div>
      <div id="langfuseContent"><div class="empty-state">No data</div></div>
    </div>
    <!-- eval moved to main content area -->
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div class="sidebar-title">GitHub Activity</div>
      <div id="githubContent"><div class="empty-state">Loading...</div></div>
    </div>
  </div>
</div>

<!-- STREAM PANEL -->
<div class="stream-overlay" id="streamOverlay">
  <div class="stream-header">
    <span class="stream-title" id="streamTitle">Live Stream</span>
    <button class="stream-close" id="streamClose">&times;</button>
  </div>
  <div class="stream-body" id="streamBody"></div>
</div>

<script>
const $ = s => document.querySelector(s);
let state = null, ws = null, reconnectTimer = null;
let selectedTaskId = null, eventSource = null, evalData = null;
let filterDays = 7;

// --- WebSocket ---
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => { $('#connectionDot').classList.add('connected'); clearTimeout(reconnectTimer); };
  ws.onclose = () => { $('#connectionDot').classList.remove('connected'); reconnectTimer = setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'update' && msg.data) { state = msg.data; render(); }
    } catch {}
  };
}
function send(action, data = {}) { if (ws?.readyState === 1) ws.send(JSON.stringify({ action, ...data })); }

// --- Helpers ---
function timeAgo(d) {
  if (!d) return '--';
  const s = (Date.now() - new Date(d).getTime()) / 1000;
  if (s < 60) return `${Math.floor(s)}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}
function fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(0)+'K';
  return String(n);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

function filterByDays(list) {
  if (filterDays === 0) return list;
  const cutoff = Date.now() - filterDays * 86400000;
  return list.filter(a => {
    const t = a.completedAt || a.startedAt || a.createdAt;
    return t && new Date(t).getTime() >= cutoff;
  });
}

// --- Render ---
function render() {
  if (!state) return;
  renderKPIs();
  renderAlerts();
  renderInfra();
  renderReplicants();
  renderActiveAgents();
  renderLangfuse();
  renderSourceBreakdown();
  renderProcesses();
  renderRecent();
  renderGithub();
  fetchEval();
  if (state.lastUpdated) $('#lastUpdated').textContent = new Date(state.lastUpdated).toLocaleTimeString();
}

function renderKPIs() {
  const s = state.stats || {};
  const recent = filterByDays(state.recent || []);
  const completed = recent.filter(a => a.status === 'done' || a.success).length;
  const failed = recent.filter(a => a.status !== 'done' && !a.success).length;
  const total = completed + failed;
  const runtimes = recent.filter(a => parseFloat(a.runtimeMin) > 0);
  const avgRt = runtimes.length ? (runtimes.reduce((s,a) => s + parseFloat(a.runtimeMin), 0) / runtimes.length).toFixed(1) : '0';
  const successRate = total > 0 ? ((completed / total) * 100).toFixed(0) : '--';

  $('#kpiActive').textContent = s.totalActive || 0;
  $('#kpiSlots').textContent = `${s.totalActive||0} / ${s.maxConcurrent||3} slots`;
  $('#kpiCompleted').textContent = completed;
  $('#kpiCompletedSub').textContent = `in ${filterDays === 0 ? 'all time' : filterDays + 'd'}`;
  $('#kpiFailed').textContent = failed;
  $('#kpiRuntime').textContent = avgRt;
  $('#kpiSuccessRate').textContent = successRate === '--' ? '--' : successRate + '%';
  $('#kpiSuccessRateSub').textContent = `${completed}/${total} tasks`;
}

function renderAlerts() {
  const alerts = state.alerts || [];
  if (!alerts.length) { $('#alertsBar').innerHTML = ''; return; }
  $('#alertsBar').innerHTML = alerts.map(a => `
    <div class="alert-item ${a.level==='CRITICAL'?'critical':'warning'}">
      <span class="alert-badge">${esc(a.level)}</span>
      <span class="alert-msg">${esc(a.message)}</span>
      <span class="alert-task">${esc(a.taskId)}</span>
    </div>`).join('');
}

function renderInfra() {
  const sys = state.system || {};
  const remote = state.remote || {};
  const billy = state.billy || {};
  const items = [
    { label: 'Gateway', status: sys.gateway || 'unknown' },
    { label: 'MySQL', status: sys.mysql || 'unknown' },
    { label: 'Launchd', status: sys.launchd || 'unknown', value: sys.launchdCount ? `(${sys.launchdCount})` : '' },
    { label: 'Queue', status: sys.queue==='paused'?'paused':sys.queue==='active'?'ok':'unknown', value: sys.queue||'' },
    { label: 'SoA VM', status: remote.online?'ok':'offline', value: remote.online?`${remote.processCount} procs`:'' },
    { label: 'Billy VM', status: billy.online?'ok':'offline', value: billy.online?`${billy.processCount} procs`:'' },
  ];
  $('#infraStrip').innerHTML = items.map(i => `
    <div class="infra-item">
      <div class="infra-dot ${i.status}"></div>
      <span class="infra-label">${i.label}</span>
      ${i.value?`<span class="infra-value">${esc(i.value)}</span>`:''}
    </div>`).join('');
}

function renderReplicants() {
  const sys = state.system || {};
  const remote = state.remote || {};
  const billy = state.billy || {};
  const active = state.active || [];

  const replicants = [
    {
      id: 'anton', name: 'Anton', role: 'Orchestrator',
      loc: "Caio's Mac", fw: 'OpenClaw', online: sys.gateway==='ok',
      metrics: [
        { l: 'Running', v: `${active.length}` },
        { l: 'Tasks', v: `${(state.stats?.completedToday||0)+(state.stats?.failedToday||0)}` },
        { l: 'Gateway', v: sys.gateway==='ok'?'OK':'Down' },
        { l: 'Queue', v: sys.queue||'--' },
      ]
    },
    {
      id: 'son-of-anton', name: 'Son of Anton', role: 'Monitor',
      loc: 'VM 89.167.23.2', fw: 'ClawdBot', online: remote.online,
      metrics: [
        { l: 'Gateway', v: remote.gateway||'offline' },
        { l: 'Processes', v: `${remote.processCount||0}` },
        { l: 'Framework', v: 'ClawdBot' },
        { l: 'VM', v: '.23.2' },
      ]
    },
    {
      id: 'billy', name: 'Billy', role: 'Data Assistant',
      loc: 'VM 89.167.64.183', fw: 'OpenClaw', online: billy.online,
      metrics: [
        { l: 'Gateway', v: billy.gateway||'offline' },
        { l: 'Processes', v: `${billy.processCount||0}` },
        { l: 'Framework', v: 'OpenClaw' },
        { l: 'VM', v: '.64.183' },
      ]
    },
  ];

  $('#replicantsGrid').innerHTML = replicants.map(r => `
    <div class="replicant-card ${r.id}">
      <div class="rep-header">
        <span class="rep-name">${r.name}</span>
        <span class="rep-pill ${r.online?'online':'offline'}"><span class="dot"></span>${r.online?'Online':'Offline'}</span>
      </div>
      <div class="rep-role">${r.role} &middot; ${r.loc} &middot; ${r.fw}</div>
      <div class="rep-metrics">${r.metrics.map(m => `
        <div><span class="rep-metric-label">${m.l}</span><div class="rep-metric-value">${esc(m.v)}</div></div>
      `).join('')}</div>
    </div>`).join('');
}

function renderActiveAgents() {
  const agents = state.active || [];
  $('#activeCount').textContent = `${agents.length} running`;
  if (!agents.length) { $('#agentsGrid').innerHTML = '<div class="empty-state">No active agents</div>'; return; }

  $('#agentsGrid').innerHTML = agents.map(a => {
    const h = a.health?.status||'healthy', tid = a.taskId||'--';
    const role = a.role||'main', src = a.source||'unknown';
    const prog = parseFloat(a.progress)||0;
    const lin = a.linear, act = a.activity;
    return `
      <div class="agent-card${tid===selectedTaskId?' selected':''}" data-health="${h}" onclick="selectAgent('${esc(tid)}')">
        <div class="agent-top">
          <div>
            <div class="agent-id">${esc(tid)}</div>
            <div class="agent-label">${esc(a.label||'--')}</div>
          </div>
          <div class="agent-badges">
            <span class="badge badge-role" data-role="${esc(role)}">${esc(role)}</span>
            <span class="badge badge-source" data-source="${esc(src)}">${esc(src)}</span>
          </div>
        </div>
        <div class="agent-progress-row">
          <div class="progress-bar-wrap"><div class="progress-fill ${h}" style="width:${prog}%"></div></div>
          <span class="agent-timing">${a.runtimeMin||0}m / ${a.timeoutMin||25}m</span>
        </div>
        <div class="agent-details">
          <span class="agent-detail">PID <span class="val">${a.pid||'--'}</span></span>
          <span class="agent-detail">Alive <span class="val">${a.alive?'Y':'N'}</span></span>
          ${a.retries?`<span class="agent-detail">Retries <span class="val">${a.retries}</span></span>`:''}
          ${a.extensions?`<span class="agent-detail">Ext <span class="val">${a.extensions}</span></span>`:''}
          ${act?`<span class="agent-activity">${esc(act.lastEvent)}</span>`:''}
        </div>
        ${lin?`<div class="agent-linear">
          <span class="linear-state"><span class="linear-dot" style="background:${lin.stateColor||'#666'}"></span>${esc(lin.state||'--')}</span>
          <span class="linear-title">${esc(lin.title||'')}</span>
          <span class="linear-updated">${timeAgo(lin.updatedAt)}</span>
        </div>`:''}
        <div class="agent-actions" onclick="event.stopPropagation()">
          <button class="btn-sm" onclick="selectAgent('${esc(tid)}')">Stream</button>
          <button class="btn-sm" onclick="logNote('${esc(a.sessionKey)}')">Note</button>
          <button class="btn-sm danger" onclick="killAgent('${esc(a.sessionKey)}','${esc(tid)}')">Kill</button>
        </div>
      </div>`;
  }).join('');
}

function renderLangfuse() {
  const lf = state.langfuse;
  if (!lf) { $('#langfuseContent').innerHTML = '<div class="empty-state">No Langfuse data</div>'; return; }
  const traces = lf.recentTraces || [];
  $('#langfuseContent').innerHTML = `
    <div class="lf-kpis">
      <div class="lf-kpi"><div class="lf-kpi-val">${lf.totalTraces}</div><div class="lf-kpi-label">Traces</div></div>
      <div class="lf-kpi"><div class="lf-kpi-val">${lf.avgLatency}ms</div><div class="lf-kpi-label">Latency</div></div>
      <div class="lf-kpi"><div class="lf-kpi-val">${lf.errorRate}%</div><div class="lf-kpi-label">Errors</div></div>
      <div class="lf-kpi"><div class="lf-kpi-val">$${lf.totalCost}</div><div class="lf-kpi-label">Cost</div></div>
      <div class="lf-kpi"><div class="lf-kpi-val">${fmtTokens(lf.totalTokens)}</div><div class="lf-kpi-label">Tokens</div></div>
      <div class="lf-kpi"><div class="lf-kpi-val">${traces.length}</div><div class="lf-kpi-label">Recent</div></div>
    </div>
    ${traces.map(t => `
      <div class="trace-item">
        <span class="trace-name">${esc(t.name)}</span>
        <span class="trace-meta">${t.latency?t.latency+'ms':'--'}</span>
        <span class="trace-meta">${fmtTokens(t.totalTokens)}</span>
        <span class="${t.status==='ERROR'?'trace-status-err':'trace-status-ok'}">${t.status==='ERROR'?'ERR':'OK'}</span>
      </div>
    `).join('')}
  `;
}

function renderGithub() {
  const commits = state.github || [];
  if (!commits.length) { $('#githubContent').innerHTML = '<div class="empty-state">No GitHub data</div>'; return; }

  const repoClass = (r) => {
    if (r.includes('anton') && !r.includes('son')) return 'anton';
    if (r.includes('son')) return 'son-of-anton';
    if (r.includes('billy')) return 'billy';
    return '';
  };

  $('#githubContent').innerHTML = commits.map(c => `
    <div class="commit-item">
      <div class="commit-header">
        <span class="commit-repo ${repoClass(c.repo)}">${esc(c.agent)}</span>
        <span class="commit-sha">${esc(c.sha)}</span>
        <span class="commit-date">${timeAgo(c.date)}</span>
      </div>
      <div class="commit-msg">${esc(c.message)}</div>
      <div class="commit-author">${esc(c.author)}</div>
    </div>
  `).join('');
}

function renderSourceBreakdown() {
  const all = [...(state.active||[]), ...filterByDays(state.recent||[])];
  const counts = {};
  for (const a of all) { const s = a.source||'unknown'; counts[s] = (counts[s]||0)+1; }
  const colors = { 'manual':'var(--source-manual)', 'auto-queue':'var(--source-auto-queue)', 'auto-review':'var(--source-auto-review)', 'process-callback':'var(--source-callback)' };
  $('#sourceBreakdown').innerHTML = Object.entries(counts).map(([s,n]) => `
    <div class="source-item">
      <div class="source-dot" style="background:${colors[s]||'var(--text-muted)'}"></div>
      <span class="source-label">${esc(s)}</span>
      <span class="source-count">${n}</span>
    </div>`).join('');
}

function renderProcesses() {
  const procs = state.processes || [];
  $('#processCount').textContent = procs.length;
  if (!procs.length) { $('#processesContainer').innerHTML = '<div class="empty-state">No tracked processes</div>'; return; }
  $('#processesContainer').innerHTML = `
    <table class="proc-table">
      <thead><tr><th>ID</th><th>Type</th><th>Task</th><th>PID</th><th>Alive</th><th>Age</th><th>Status</th></tr></thead>
      <tbody>${procs.map(p => `
        <tr>
          <td class="mono">${esc(p.id?.substring(0,8))}</td>
          <td>${esc(p.type)}</td>
          <td class="mono">${esc(p.taskId||'--')}</td>
          <td class="mono">${p.pid||'--'}</td>
          <td class="${p.alive?'alive-y':'alive-n'}">${p.alive?'Y':'N'}</td>
          <td class="mono">${p.ageMin}m</td>
          <td>${esc(p.status)}</td>
        </tr>`).join('')}</tbody>
    </table>`;
}

function renderRecent() {
  const recent = filterByDays(state.recent || []);
  $('#recentCount').textContent = recent.length;
  if (!recent.length) { $('#recentGrid').innerHTML = '<div class="empty-state">No completions in this period</div>'; return; }
  $('#recentGrid').innerHTML = recent.slice(0,20).map(a => {
    const ok = a.status==='done'||a.success;
    const tid = a.taskId||'--';
    return `
      <div class="recent-card ${ok?'success':'failure'}" onclick="selectAgent('${tid}')" style="cursor:pointer" data-task-id="${tid}">
        <div class="recent-id">${esc(tid)}</div>
        <div class="recent-label">${esc(a.label||'--')}</div>
        <div class="recent-meta">
          <span class="mono">${a.runtimeMin||'0'}m</span>
          <span>${timeAgo(a.completedAt)}</span>
        </div>
        ${a.role?`<div style="margin-top:4px"><span class="badge badge-role" data-role="${esc(a.role)}">${esc(a.role)}</span></div>`:''}
      </div>`;
  }).join('');
}

// --- Eval ---
let evalTimer = null;
async function fetchEval() {
  clearTimeout(evalTimer);
  try { const r = await fetch('/api/eval'); if (r.ok) { evalData = await r.json(); renderEval(); } } catch {}
  evalTimer = setTimeout(fetchEval, 30000);
}
function renderTokens() {
  const tokens = state.tokens || [];
  if (!tokens.length) { $('#tokenContent').innerHTML = '<div class="empty-state">No session data</div>'; return; }
  
  $('#tokenContent').innerHTML = tokens.map(t => {
    const pct = t.percent || 0;
    const color = pct > 80 ? 'var(--accent-red)' : pct > 60 ? 'var(--accent-orange)' : 'var(--accent-green)';
    return `
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;font-weight:600">${esc(t.agent)}</span>
          <span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${t.used}k/${t.total}k (${pct}%)</span>
        </div>
        <div class="eval-bar"><div class="eval-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
  }).join('');
}

function renderEval() {
  if (!evalData || evalData.error) { $('#evalContent').innerHTML = '<div class="empty-state">No eval data</div>'; return; }
  const t = evalData.target||{}, ce = evalData.current_eval||{}, p = ce.progress||{}, runs = evalData.recent_runs||[];
  
  $('#evalCount').textContent = runs.length;
  
  // Summary KPIs
  const summaryHtml = `
    <div class="eval-summary">
      <div class="eval-kpi"><div class="eval-kpi-val" style="color:var(--accent-cyan)">${t.target_accuracy?(t.target_accuracy*100).toFixed(1)+'%':'--'}</div><div class="eval-kpi-label">Target</div></div>
      <div class="eval-kpi"><div class="eval-kpi-val" style="color:var(--accent-green)">${t.current_accuracy?(t.current_accuracy*100).toFixed(1)+'%':'--'}</div><div class="eval-kpi-label">Current</div></div>
      <div class="eval-kpi"><div class="eval-kpi-val" style="color:var(--accent-orange)">${t.remaining_pp?t.remaining_pp.toFixed(1)+'pp':'--'}</div><div class="eval-kpi-label">Gap</div></div>
      <div class="eval-kpi"><div class="eval-kpi-val">${t.iterations||'--'}</div><div class="eval-kpi-label">Runs</div></div>
    </div>`;

  // Current eval progress card (if running)
  const progressHtml = p.percent !== undefined && p.percent < 100 ? `
    <div class="eval-progress-card">
      <div class="eval-card-top">
        <span style="color:var(--accent-cyan);font-weight:600">⏳ Eval Running</span>
        <span class="eval-card-date">${p.completed||0}/${p.total||0} cases</span>
      </div>
      <div class="eval-card-bar"><div class="eval-card-bar-fill" style="width:${p.percent}%"></div></div>
      <div class="eval-card-meta"><span>${p.percent}% complete</span></div>
    </div>` : '';

  // Eval run cards
  const cardsHtml = runs.map(r => {
    const d = parseFloat(r.delta_pp)||0;
    const cls = d > 0 ? 'positive' : d < 0 ? 'negative' : 'neutral';
    const deltaCls = d >= 0 ? 'pos' : 'neg';
    const accRaw = r.accuracy_raw || 0;
    const barPct = Math.min(100, (accRaw / (t.target_accuracy || 0.87)) * 100);
    const barColor = accRaw >= (t.target_accuracy||0.87) ? 'var(--accent-green)' : accRaw >= 0.80 ? 'var(--accent-cyan)' : accRaw >= 0.75 ? 'var(--accent-orange)' : 'var(--accent-red)';
    return `
      <div class="eval-card ${cls}">
        <div class="eval-card-top">
          <span class="eval-card-acc">${esc(r.accuracy)}</span>
          <span class="eval-card-delta ${deltaCls}">${d>=0?'+':''}${r.delta_pp}pp</span>
        </div>
        <div class="eval-card-bar"><div class="eval-card-bar-fill" style="width:${barPct.toFixed(0)}%;background:${barColor}"></div></div>
        <div class="eval-card-meta">
          <span>${esc(r.run_name)}</span>
          <span>${r.total_tests} cases</span>
        </div>
      </div>`;
  }).join('');

  $('#evalContent').innerHTML = summaryHtml + progressHtml + `<div class="eval-grid">${cardsHtml}</div>`;
}

// --- Stream ---
function selectAgent(tid) {
  if (selectedTaskId===tid) { closeStream(); return; }
  closeSSE();
  selectedTaskId = tid;
  openStream(tid);
  render();
}
function skeletonHTML() {
  return Array.from({length:8}, () => '<div class="skeleton-line"></div>').join('');
}
let streamGotData = false;
function openStream(tid) {
  closeSSE();
  streamGotData = false;
  $('#streamBody').innerHTML = skeletonHTML();
  $('#streamTitle').textContent = `Stream: ${tid}`;
  $('#streamOverlay').classList.add('open');

  eventSource = new EventSource(`/api/stream/${encodeURIComponent(tid)}`);
  eventSource.onmessage = e => { try { if (!streamGotData) { streamGotData=true; $('#streamBody').innerHTML=''; } appendEv(JSON.parse(e.data)); } catch {} };
  eventSource.onerror = () => { closeSSE(); if (!streamGotData) { streamGotData=true; $('#streamBody').innerHTML=''; } appendEv({ event: '[Connection closed]' }); };
}
function appendEv(d) {
  const body = $('#streamBody'), el = document.createElement('div');
  el.className = 'stream-event';
  const ev = d.event||'';
  if (ev.startsWith('[tool]')) el.classList.add('tool');
  else if (ev.startsWith('[text]')) el.classList.add('text');
  else if (ev.startsWith('[think]')) el.classList.add('think');
  else if (ev.startsWith('[meta]')) el.classList.add('meta');
  else if (ev.startsWith('[result]')) el.classList.add('result');
  else if (ev.startsWith('[error]')) el.classList.add('error');
  else if (ev.startsWith('[done]')) el.classList.add('done');
  const ts = d.ts ? `<span class="ts">${new Date(d.ts).toLocaleTimeString()}</span>` : '';
  el.innerHTML = `${ts}${esc(ev)}`;
  body.appendChild(el); body.scrollTop = body.scrollHeight;
}
function closeStream() { selectedTaskId=null; closeSSE(); $('#streamOverlay').classList.remove('open'); render(); }
function closeSSE() { if (eventSource) { eventSource.close(); eventSource=null; } }

// --- Actions ---
function killAgent(sk, tid) { if (confirm(`Kill ${tid}?`)) send('kill', { sessionKey: sk }); }
function logNote(sk) { const m = prompt('Note for Linear:'); if (m) send('note', { sessionKey: sk, message: m }); }

// --- Filter buttons ---
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterDays = parseInt(btn.dataset.days);
    render();
  });
});

$('#btnRefresh').addEventListener('click', () => send('refresh'));
$('#streamClose').addEventListener('click', closeStream);
document.addEventListener('keydown', e => { if (e.key==='Escape'&&selectedTaskId) closeStream(); });

connect();
</script>

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clawdbot-neuron-netpol
  namespace: clawdbots-dev
spec:
  podSelector:
    matchLabels:
      app: clawdbot-neuron
  policyTypes:
    - Egress
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS (Slack API, OpenClaw, Anthropic, Google APIs)
    - ports:
        - port: 443
          protocol: TCP
    # Cloud SQL Proxy (localhost sidecar)
    - to:
        - podSelector:
            matchLabels:
              app: clawdbot-neuron
      ports:
        - port: 3306
          protocol: TCP

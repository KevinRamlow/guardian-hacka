apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawdbot-billy
  namespace: clawdbots-dev
  labels:
    app: clawdbot-billy
    platform: clawdbots
    agent: "billy"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawdbot-billy
  template:
    metadata:
      labels:
        app: clawdbot-billy
        platform: clawdbots
    spec:
      serviceAccountName: clawdbot-billy
      containers:
        - name: agent
          image: us-east1-docker.pkg.dev/brandlovers-prod/clawdbots/clawdbot-billy:latest
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          envFrom:
            - secretRef:
                name: clawdbot-billy-secrets
          env:
            - name: AGENT_NAME
              value: "billy"
            - name: NODE_ENV
              value: "production"
      restartPolicy: Always

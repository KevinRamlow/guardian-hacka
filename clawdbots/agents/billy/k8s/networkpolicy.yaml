apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clawdbot-billy-netpol
  namespace: clawdbots-dev
spec:
  podSelector:
    matchLabels:
      app: clawdbot-billy
  policyTypes:
    - Egress
  egress:
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS (APIs, Slack, OpenClaw)
    - to: []
      ports:
        - port: 443
          protocol: TCP
    # Cloud SQL Proxy (if sidecar)
    - to: []
      ports:
        - port: 3306
          protocol: TCP

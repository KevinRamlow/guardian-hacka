apiVersion: apps/v1
kind: Deployment
metadata:
  name: anton-openclaw
  labels:
    app: anton-openclaw
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate  # Required: PVC RWO can't attach to two pods simultaneously
  selector:
    matchLabels:
      app: anton-openclaw
  template:
    metadata:
      labels:
        app: anton-openclaw
        tags.datadoghq.com/env: "prod"
        tags.datadoghq.com/service: "anton-openclaw"
        tags.datadoghq.com/version: "latest"
    spec:
      serviceAccountName: anton-openclaw
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000  # node user group — ensures PVC writes work
      containers:
        - name: anton-openclaw
          image: gcr.io/brandlovers-prod/brandlovers-team/anton-openclaw:latest
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: DD_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/env']
            - name: DD_SERVICE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/service']
            - name: DD_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/version']
          envFrom:
            - secretRef:
                name: anton-openclaw
          volumeMounts:
            - name: openclaw-state
              mountPath: /home/node/.openclaw
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: openclaw-state
          persistentVolumeClaim:
            claimName: anton-openclaw-state

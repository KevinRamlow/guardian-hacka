apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: anton-openclaw
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: anton-openclaw=gcr.io/brandlovers-prod/brandlovers-team/anton-openclaw
    argocd-image-updater.argoproj.io/update-strategy: newest-build
spec:
  project: default
  source:
    repoURL: git@github.com:brandlovers-team/cicd-k8s.git
    targetRevision: main
    path: apps/prod/anton-openclaw
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

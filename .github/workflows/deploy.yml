name: Build & Deploy Anton

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'openclaw.json'
      - 'hooks/**'
      - 'workspace/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  Workflow:
    uses: brandlovers-team/reusable-workflows-ci/.github/workflows/build-ci.yml@main
    with:
      GO_VERSION: "1.23"
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      RELEASE_GH_TOKEN: ${{ secrets.RELEASE_GH_TOKEN }}
      GCP_SERVICE_ACCOUNT_KEY_HOMOLOG: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_HOMOLOG }}
      GCP_SERVICE_ACCOUNT_KEY_PROD: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_PROD }}
